name: Deploy Java Lambda 

on:
  push:
    branches:
      - main  # deploy only from main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1             # Change to your AWS region
      LAMBDA_FUNCTION_NAME: particle-url-lambda  # Change to your Lambda function name

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Java
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build fat JAR with Maven
      - name: Build Fat JAR
        working-directory: server
        run: |
          mvn clean package shade:shade

      # 4. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Deploy fat JAR to Lambda
      - name: Deploy to AWS Lambda
        run: |
          JAR_FILE=server/target/*-shaded.jar
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_NAME \
            --zip-file fileb://$JAR_FILE