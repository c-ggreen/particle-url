name: Deploy Java Lambda via OIDC

on:
  workflow_dispatch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1             # Change to your region
      LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}  # Change to your Lambda function name

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Java 17
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build fat JAR with Maven
      - name: Build Fat JAR
        working-directory: server
        run: |
          mvn clean package shade:shade

      # 4. Configure AWS credentials via OIDC
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Deploy fat JAR to Lambda
      - name: Deploy to AWS Lambda
        run: |
          JAR_FILE=server/target/*-shaded.jar
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://$JAR_FILE